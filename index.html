<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTRA — Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080d;--bg2:#0d0f1a;--panel:#111422;--panel2:#161928;
  --border:#1e2240;--border2:#2a3060;
  --gold:#f0c040;--gold2:#ffd97d;--cyan:#00e5ff;--purple:#a855f7;
  --red:#ff4466;--green:#22d984;
  --text:#e8eaf6;--text2:#8892c0;--text3:#404870;
  --glow-gold:0 0 24px rgba(240,192,64,.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden}

/* subtle grid bg */
body::before{content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(30,34,64,.4) 1px,transparent 1px),linear-gradient(90deg,rgba(30,34,64,.4) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none}
body::after{content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 20% 0%,rgba(168,85,247,.07) 0%,transparent 55%),
             radial-gradient(ellipse at 80% 100%,rgba(0,229,255,.05) 0%,transparent 55%);
  pointer-events:none}

#app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* ── LOGIN WALL ── */
#login-wall{
  position:fixed;inset:0;z-index:500;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
}
#login-wall.hidden{display:none}
.login-box{
  width:100%;max-width:400px;padding:2rem;
  background:var(--panel);border:1px solid var(--border2);border-radius:20px;
  box-shadow:0 0 60px rgba(0,0,0,.6),0 0 0 1px rgba(240,192,64,.08);
  text-align:center;
}
.login-logo{
  font-family:'Cinzel Decorative',serif;font-size:2rem;font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 16px rgba(240,192,64,.3));
  margin-bottom:.25rem;
}
.login-sub{color:var(--text3);font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;margin-bottom:2rem}
.login-box label{display:block;text-align:left;color:var(--text2);font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem}
.login-box input{
  width:100%;background:var(--bg2);border:1px solid var(--border2);
  color:var(--text);border-radius:10px;padding:.65rem 1rem;
  font-family:'Exo 2',sans-serif;font-size:.95rem;letter-spacing:.08em;
  margin-bottom:1rem;transition:border-color .2s,box-shadow .2s;
}
.login-box input:focus{outline:none;border-color:var(--gold);box-shadow:var(--glow-gold)}
.login-box input::placeholder{color:var(--text3)}
#login-error{color:var(--red);font-size:.8rem;margin-bottom:.75rem;min-height:1em}

/* ── HEADER ── */
header{
  padding:.9rem 2rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  background:rgba(7,8,13,.85);backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:100;
}
.header-left{display:flex;align-items:center;gap:1.25rem}

/* Logo slot — put your <img> here or leave as text */
.logo-img{height:36px;width:auto;object-fit:contain}
.logo-text{
  font-family:'Cinzel Decorative',serif;font-size:1.3rem;font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-divider{width:1px;height:28px;background:var(--border2)}

#auth-bar{display:flex;align-items:center;gap:.7rem}
.user-pill{
  display:flex;align-items:center;gap:.6rem;
  background:var(--panel);border:1px solid var(--border2);border-radius:8px;padding:.3rem .75rem .3rem .4rem;
}
.user-avatar{
  width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;
}
.user-name{font-size:.83rem;color:var(--text2);font-weight:600}
.ticket-count{color:var(--gold);font-weight:700;font-size:.83rem;letter-spacing:.03em}

/* ── REDEEM BAR ── */
.redeem-bar{
  display:flex;align-items:center;gap:.65rem;
  padding:.65rem 2rem;border-bottom:1px solid var(--border);
  background:rgba(240,192,64,.02);
}
.redeem-bar input{
  width:220px;background:var(--panel);border:1px solid var(--border2);
  color:var(--text);border-radius:8px;padding:.42rem .85rem;
  font-family:'Exo 2',sans-serif;font-size:.83rem;
  text-transform:uppercase;letter-spacing:.12em;transition:border-color .2s;
}
.redeem-bar input:focus{outline:none;border-color:var(--gold)}
.redeem-bar input::placeholder{color:var(--text3);letter-spacing:.1em}
#redeem-msg{font-size:.78rem;font-weight:600}

/* ── TABS ── */
nav.tabs{
  display:flex;overflow-x:auto;border-bottom:1px solid var(--border);
  background:var(--bg2);padding:0 2rem;scrollbar-width:none;flex-shrink:0;
}
nav.tabs::-webkit-scrollbar{display:none}
.tab-btn{
  padding:.75rem 1.2rem;background:none;border:none;cursor:pointer;
  font-family:'Exo 2',sans-serif;font-size:.82rem;font-weight:600;
  color:var(--text3);border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap;
}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn .edate{font-size:.64rem;display:block;font-weight:300;margin-top:.1rem;color:var(--text3)}
.tab-btn.active .edate{color:var(--gold2)}

/* ── MAIN ── */
main{flex:1;padding:2rem;max-width:1100px;margin:0 auto;width:100%}

/* ── COMPONENTS ── */
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.45rem 1rem;border-radius:8px;border:none;cursor:pointer;
  font-family:'Exo 2',sans-serif;font-size:.82rem;font-weight:600;
  transition:all .18s;text-decoration:none;white-space:nowrap;
}
.btn-gold{background:var(--gold);color:#1a1200}
.btn-gold:hover{background:var(--gold2);box-shadow:var(--glow-gold)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);border-color:var(--cyan)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{filter:brightness(1.1)}
.btn-sm{padding:.3rem .7rem;font-size:.76rem}

.card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:14px;padding:1.35rem;margin-bottom:1.25rem;
}
.card-title{
  font-family:'Cinzel Decorative',serif;font-size:.85rem;
  color:var(--gold);margin-bottom:.9rem;letter-spacing:.05em;
}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
@media(max-width:720px){.grid2,.grid3{grid-template-columns:1fr}}

.event-header{padding:1.75rem 0 1.25rem;border-bottom:1px solid var(--border);margin-bottom:1.75rem}
.event-title{
  font-family:'Cinzel Decorative',serif;font-size:clamp(1.4rem,3.5vw,2rem);
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:.3rem;
}
.event-date-lbl{color:var(--text3);font-size:.8rem;letter-spacing:.12em}

/* countdown */
.cd-wrap{text-align:center;padding:3rem 1rem}
.cd-label{font-family:'Cinzel Decorative',serif;font-size:1.1rem;color:var(--text2);margin-bottom:1.25rem}
.cd-timer{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap}
.cd-unit{background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:1rem 1.5rem;min-width:72px}
.cd-unit .n{font-family:'Cinzel Decorative',serif;font-size:2rem;color:var(--gold);display:block;line-height:1;text-shadow:var(--glow-gold)}
.cd-unit .l{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.15em;display:block;margin-top:.2rem}

/* tables */
.rtable{width:100%;border-collapse:collapse}
.rtable th{text-align:left;color:var(--text3);font-size:.72rem;letter-spacing:.1em;padding:.4rem .65rem;border-bottom:1px solid var(--border)}
.rtable td{padding:.5rem .65rem;border-bottom:1px solid var(--border);font-size:.85rem}
.rtable tr:last-child td{border-bottom:none}
.gold{color:var(--gold);font-weight:700}

/* choices */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.choice{
  background:var(--panel2);border:1px solid var(--border2);color:var(--text);
  border-radius:8px;padding:.5rem .85rem;cursor:pointer;
  font-family:'Exo 2',sans-serif;font-size:.82rem;text-align:left;transition:all .15s;
}
.choice:hover{border-color:var(--cyan)}
.choice.sel{border-color:var(--gold);color:var(--gold);background:rgba(240,192,64,.07)}

/* q card */
.qcard{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:1.1rem;margin-bottom:.8rem}
.qcard .qt{font-weight:600;margin-bottom:.65rem;line-height:1.5;font-size:.9rem}
.hard-tag{font-size:.64rem;background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.3);border-radius:4px;padding:.1rem .35rem;margin-left:.4rem;vertical-align:middle}

/* boss */
.boss-wrap{background:linear-gradient(135deg,#100808,#1a0505);border:1px solid #3a1010;border-radius:14px;padding:1.5rem;margin-bottom:1.5rem}
.boss-name{font-family:'Cinzel Decorative',serif;font-size:1.5rem;color:var(--red);text-align:center;margin-bottom:.7rem;text-shadow:0 0 30px rgba(255,68,102,.3)}
.hp-track{width:100%;height:22px;background:#1a0505;border-radius:6px;overflow:hidden;border:1px solid #3a1010}
.hp-fill{height:100%;background:linear-gradient(90deg,#7f0000,#ff4466);border-radius:6px;transition:width .5s;box-shadow:0 0 14px rgba(255,68,102,.5)}
.hp-txt{text-align:center;margin-top:.4rem;color:var(--red);font-size:.82rem}

.class-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin:.75rem 0}
.class-btn{background:var(--panel2);border:2px solid var(--border);border-radius:10px;padding:1rem;cursor:pointer;font-family:'Exo 2',sans-serif;transition:all .18s;text-align:center}
.class-btn:hover{border-color:var(--cyan)}.class-btn.sel{border-color:var(--gold);box-shadow:var(--glow-gold)}
.class-icon{font-size:2rem;display:block;margin-bottom:.35rem}
.class-name{font-size:.88rem;font-weight:700}.class-desc{font-size:.7rem;color:var(--text2);margin-top:.15rem}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}
.stat-b{background:var(--bg2);border-radius:8px;padding:.65rem}
.stat-b .sl{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.2rem}
.stat-b .st{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.stat-b .sf{height:100%;border-radius:3px;transition:width .3s}
.hp-c .sf{background:var(--green)}.mana-c .sf{background:var(--cyan)}.stam-c .sf{background:var(--gold)}
.stat-b .sv{font-size:.72rem;color:var(--text2);margin-top:.2rem}

.act-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.4rem;margin-top:.9rem}
.blog{background:var(--bg2);border:1px solid var(--border);border-radius:8px;height:160px;overflow-y:auto;padding:.8rem;font-size:.76rem;color:var(--text2);line-height:1.7}
.blog div{border-bottom:1px solid rgba(255,255,255,.03);padding:.05rem 0}

/* guess */
.ginput{width:100%;background:var(--panel);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:.48rem .85rem;font-family:'Exo 2',sans-serif;font-size:.85rem;transition:border-color .2s}
.ginput:focus{outline:none;border-color:var(--cyan)}

/* casino */
.cgame{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:1.25rem;text-align:center}
.cgame h3{font-family:'Cinzel Decorative',serif;font-size:.88rem;color:var(--gold);margin-bottom:.75rem}
.cresult{font-size:1rem;font-weight:700;min-height:1.6em;display:flex;align-items:center;justify-content:center;margin:.55rem 0}
.binput{width:80px;background:var(--panel2);border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:.35rem .6rem;font-family:'Exo 2',sans-serif;font-size:.9rem;text-align:center;margin:.4rem}
.reels{display:flex;gap:.4rem;justify-content:center;margin:.75rem 0}
.reel{width:52px;height:52px;background:var(--bg2);border:2px solid var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;transition:all .3s}
.reel.spin{animation:spin .4s ease}
@keyframes spin{0%{transform:rotateX(0)}50%{transform:rotateX(180deg)}100%{transform:rotateX(360deg)}}
.coin{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#b8860b);margin:.8rem auto;font-size:1.6rem;display:flex;align-items:center;justify-content:center;box-shadow:var(--glow-gold)}
.coin.flip{animation:cflip .8s ease}
@keyframes cflip{0%{transform:rotateY(0)}50%{transform:rotateY(900deg)}100%{transform:rotateY(1080deg)}}
.chambers{display:flex;justify-content:center;gap:.35rem;margin:.75rem 0;flex-wrap:wrap}
.chamber{width:36px;height:36px;border-radius:50%;border:2px solid var(--border2);background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .3s}
.chamber.danger{background:var(--red);border-color:var(--red);box-shadow:0 0 10px rgba(255,68,102,.5)}
.chamber.safe{background:var(--green);border-color:var(--green)}

/* leaderboard */
.lb-row{display:flex;align-items:center;gap:.9rem;padding:.6rem .9rem;border-bottom:1px solid var(--border)}
.lb-row:hover{background:rgba(255,255,255,.015)}
.lb-rank{width:28px;font-family:'Cinzel Decorative',serif;font-size:.88rem;color:var(--text3);text-align:center}
.lb-rank.r1{color:var(--gold)}.lb-rank.r2{color:#b0b8c0}.lb-rank.r3{color:#cd7f32}
.lb-name{flex:1;font-size:.88rem;font-weight:600}.lb-val{color:var(--gold);font-weight:700;font-size:.88rem}

/* misc */
.ok{color:var(--green)}.err{color:var(--red)}
.tag{display:inline-block;font-size:.68rem;font-weight:600;border-radius:4px;padding:.15rem .4rem}
.tag-cyan{background:rgba(0,229,255,.08);color:var(--cyan);border:1px solid rgba(0,229,255,.25)}
.tag-gold{background:rgba(240,192,64,.08);color:var(--gold);border:1px solid rgba(240,192,64,.25)}
.tag-purple{background:rgba(168,85,247,.08);color:var(--purple);border:1px solid rgba(168,85,247,.25)}
.divider{border:none;border-top:1px solid var(--border);margin:1.1rem 0}
.loading{color:var(--text3);text-align:center;padding:2rem;font-style:italic;font-size:.85rem}

.notif{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:.8rem 1.2rem;font-size:.83rem;font-weight:600;max-width:260px;display:none;animation:sin .3s ease}
.notif.show{display:block}.notif.ok{border-color:var(--green);color:var(--green)}.notif.err{border-color:var(--red);color:var(--red)}
@keyframes sin{from{transform:translateX(110%)}to{transform:translateX(0)}}

.sav{position:fixed;top:.75rem;right:.75rem;z-index:200;background:var(--panel);border:1px solid var(--border2);border-radius:7px;padding:.3rem .8rem;font-size:.72rem;color:var(--text3);display:none}
.sav.show{display:block}

@media(max-width:480px){
  header{padding:.75rem 1rem}
  .redeem-bar{padding:.55rem 1rem}
  nav.tabs{padding:0 1rem}
  main{padding:1.25rem}
}
</style>
</head>
<body>

<!-- ── LOGIN WALL ── -->
<div id="login-wall">
  <div class="login-box">
    <!-- LOGO: replace the text below with <img class="login-logo-img" src="your-logo.png"> if you have one -->
    <div class="login-logo">INTRA</div>
    <div class="login-sub">Events Portal</div>
    <label for="key-input">Your Access Key</label>
    <input id="key-input" type="text" placeholder="INTRA-XXXX-XXXX" maxlength="14" autocomplete="off" spellcheck="false">
    <div id="login-error"></div>
    <button class="btn btn-gold" style="width:100%;justify-content:center;padding:.65rem" onclick="doLogin()">Enter Portal →</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-left">
      <!-- LOGO SLOT: swap text for <img class="logo-img" src="logo.png" alt="INTRA"> -->
      <div class="logo-text">INTRA</div>
      <div class="logo-divider"></div>
    </div>
    <div id="auth-bar"></div>
  </header>

  <div class="redeem-bar">
    <input type="text" id="code-input" placeholder="REDEEM CODE" maxlength="16">
    <button class="btn btn-gold btn-sm" onclick="handleRedeem()">Redeem 🎫</button>
    <span id="redeem-msg"></span>
  </div>

  <nav class="tabs" id="tabs-nav"></nav>
  <main id="main-content"><div class="loading">Loading…</div></main>
</div>

<div class="notif" id="notif"></div>
<div class="sav" id="sav">💾 Saving…</div>

<script>
// ══════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════
const GH_OWNER  = "YOUR_GITHUB_USERNAME";
const GH_REPO   = "YOUR_REPO_NAME";
const GH_BRANCH = "main";
// Fine-grained PAT — Contents read+write on this repo only
// github.com/settings/tokens → Fine-grained → this repo → Contents: R+W
const GH_TOKEN  = "github_pat_XXXX";

const GUESSING_ANSWERS = {
  0:"blue",1:"pizza",2:"rpg",3:"japan",4:"coffee",
  5:"night owl",6:"cats",7:"winter",8:"pc",9:"metal"
};

const EVENTS = [
  {id:"trivia",  title:"Trivia Night",           date:"2025-06-05T00:00:00",emoji:"🧠"},
  {id:"boss",    title:"Boss Raid",               date:"2025-06-10T00:00:00",emoji:"⚔️"},
  {id:"guess",   title:"Guessing Games",          date:"2025-06-15T00:00:00",emoji:"🎯"},
  {id:"breather",title:"Breathe In, Breathe Out", date:"2025-06-20T00:00:00",emoji:"💨"},
  {id:"casino",  title:"Casino Night",            date:"2025-06-25T00:00:00",emoji:"🎰"},
];

// ══════════════════════════════════════════════════
// GITHUB API
// ══════════════════════════════════════════════════
const RAW      = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/data`;
const GH_API   = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/data`;
const _cache   = {};

async function ghRead(file) {
  if (_cache[file]) return _cache[file];
  const res = await fetch(`${RAW}/${file}?t=${Date.now()}`);
  if (!res.ok) return null;
  const d = await res.json();
  _cache[file] = d;
  return d;
}

async function ghWrite(file, data) {
  showSav(true);
  const infoRes = await fetch(`${GH_API}/${file}`, {
    headers:{ Authorization:`Bearer ${GH_TOKEN}`, Accept:"application/vnd.github+json" }
  });
  const sha = infoRes.ok ? (await infoRes.json()).sha : undefined;
  const body = {
    message:`update ${file}`,
    content: btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),
    branch: GH_BRANCH,
  };
  if (sha) body.sha = sha;
  const res = await fetch(`${GH_API}/${file}`, {
    method:"PUT",
    headers:{ Authorization:`Bearer ${GH_TOKEN}`, Accept:"application/vnd.github+json", "Content-Type":"application/json" },
    body: JSON.stringify(body),
  });
  showSav(false);
  delete _cache[file];
  if (!res.ok) throw new Error((await res.json()).message || "write failed");
}

async function ghUpdate(file, def, fn) {
  for (let i=0; i<3; i++) {
    try {
      delete _cache[file];
      const cur = (await ghRead(file)) ?? def;
      const next = fn(JSON.parse(JSON.stringify(cur)));
      if (next === false) return cur;
      await ghWrite(file, next);
      _cache[file] = next;
      return next;
    } catch(e) {
      if (i < 2) await sleep(700*(i+1)); else throw e;
    }
  }
}

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let me = null;  // { key, discord_id, username, tickets }
let activeTab = null;
let triviaAnswers = {};
let guessingAnswers = {};
let bossPlayer = null;
let bossTimer = null;
let cdTick = null;

// ══════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r,ms));
function showSav(v){ $("sav").className = v ? "sav show" : "sav" }
function notify(msg, type="ok"){
  const n=$("notif"); n.textContent=msg; n.className=`notif show ${type}`;
  clearTimeout(n._t); n._t=setTimeout(()=>n.className="notif",3500);
}
function fmtDate(d){ return new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}) }
function timeUntil(ds){
  const diff=new Date(ds)-Date.now(); if(diff<=0) return null;
  return {d:Math.floor(diff/86400000),h:Math.floor(diff%86400000/3600000),
          m:Math.floor(diff%3600000/60000),s:Math.floor(diff%60000/1000)};
}
function cdHTML(ds, label){
  const t=timeUntil(ds); if(!t) return "";
  return `<div class="cd-wrap"><div class="cd-label">${label}</div><div class="cd-timer">
    <div class="cd-unit"><span class="n" id="cd-d">${t.d}</span><span class="l">Days</span></div>
    <div class="cd-unit"><span class="n" id="cd-h">${t.h}</span><span class="l">Hours</span></div>
    <div class="cd-unit"><span class="n" id="cd-m">${t.m}</span><span class="l">Mins</span></div>
    <div class="cd-unit"><span class="n" id="cd-s">${t.s}</span><span class="l">Secs</span></div>
  </div></div>`;
}
function startCd(ds){
  clearInterval(cdTick);
  cdTick=setInterval(()=>{
    const t=timeUntil(ds); if(!t){clearInterval(cdTick);return}
    if($("cd-d"))$("cd-d").textContent=t.d;
    if($("cd-h"))$("cd-h").textContent=t.h;
    if($("cd-m"))$("cd-m").textContent=t.m;
    if($("cd-s"))$("cd-s").textContent=t.s;
  },1000);
}
function evHdr(ev){
  return `<div class="event-header"><div class="event-title">${ev.emoji} ${ev.title}</div>
    <div class="event-date-lbl">📅 ${fmtDate(ev.date)}</div></div>`;
}

async function doLogin(){
  const raw = ($("key-input")?.value||"").trim().toUpperCase();
  if (!raw){ $("login-error").textContent="Enter your key."; return; }

  $("login-error").textContent="Checking…";
  try {
    const keys = await ghRead("keys.json");
    if (!keys){ $("login-error").textContent="Could not reach server."; return; }

    const entry = keys[raw];
    if (!entry){ $("login-error").textContent="Invalid key. Check your key and try again."; return; }

    // Mark claimed if first time
    if (!entry.claimed){
      await ghUpdate("keys.json", {}, k=>{
        k[raw].claimed = true;
        k[raw].claimed_at = new Date().toISOString();
        return k;
      });
    }

    // Load ticket balance
    const tickets_data = await ghRead("tickets.json") ?? {};
    const tickets = tickets_data[entry.discord_id]?.tickets ?? 0;

    me = { key: raw, discord_id: entry.discord_id, username: entry.username, tickets };
    localStorage.setItem("intra_session", JSON.stringify({ key: raw, discord_id: entry.discord_id, username: entry.username }));

    $("login-wall").classList.add("hidden");
    renderAuth();
    buildTabs();
    showTab("home");
  } catch(e){
    $("login-error").textContent = "Error — try again.";
    console.error(e);
  }
}

function doLogout(){
  me = null;
  localStorage.removeItem("intra_session");
  $("login-wall").classList.remove("hidden");
  $("key-input").value = "";
  $("login-error").textContent = "";
}

async function restoreSession(){
  const saved = localStorage.getItem("intra_session");
  if (!saved) return false;
  try {
    const s = JSON.parse(saved);
    // Re-validate key still exists
    const keys = await ghRead("keys.json");
    if (!keys || !keys[s.key]) { localStorage.removeItem("intra_session"); return false; }
    const tickets_data = await ghRead("tickets.json") ?? {};
    const tickets = tickets_data[s.discord_id]?.tickets ?? 0;
    me = { ...s, tickets };
    return true;
  } catch{ return false; }
}

async function addTickets(discord_id, amount, reason){
  await ghUpdate("tickets.json", {}, t=>{
    t[discord_id] = t[discord_id] ?? { tickets:0, history:[] };
    t[discord_id].tickets = Math.max(0,(t[discord_id].tickets||0)+amount);
    t[discord_id].history.push({ amount, reason, ts:new Date().toISOString() });
    return t;
  });
  if (me?.discord_id === discord_id){
    me.tickets = (me.tickets||0) + amount;
    renderAuth();
  }
}

async function refreshTickets(){
  if (!me) return;
  const t = await ghRead("tickets.json") ?? {};
  me.tickets = t[me.discord_id]?.tickets ?? 0;
  delete _cache["tickets.json"];
  renderAuth();
}

function buildTabs(){
  const now = Date.now();
  const visible = EVENTS.filter(e=>{
    const d = new Date(e.date); d.setDate(d.getDate()+1);
    return now < d;
  });
  $("tabs-nav").innerHTML =
    `<button class="tab-btn ${activeTab==="home"?"active":""}" onclick="showTab('home')">🏠 Home</button>`
    + visible.map(e=>`<button class="tab-btn ${activeTab===e.id?"active":""}" onclick="showTab('${e.id}')">
        ${e.emoji} ${e.title}<span class="edate">${fmtDate(e.date)}</span></button>`).join("")
    + `<button class="tab-btn ${activeTab==="lb"?"active":""}" onclick="showTab('lb')">🏆 Leaderboard</button>`;
}

function showTab(id){
  activeTab=id; buildTabs(); clearInterval(bossTimer);
  const m=$("main-content");
  switch(id){
    case "home":    m.innerHTML=renderHome(); break;
    case "trivia":  renderTrivia(m); break;
    case "boss":    renderBoss(m); break;
    case "guess":   renderGuess(m); break;
    case "breather":m.innerHTML=renderBreather(); break;
    case "casino":  m.innerHTML=renderCasino(); break;
    case "lb":      renderLB(m); break;
  }
}

async function handleRedeem(){
  const code=($("code-input")?.value||"").trim().toUpperCase();
  if (!code) return;
  const msg=$("redeem-msg"); msg.textContent="…"; msg.className="";
  try {
    const codes=await ghRead("codes.json")??{};
    const c=codes[code];
    if (!c){ msg.textContent="❌ Invalid"; msg.className="err"; return; }
    if (c.used){ msg.textContent="❌ Already used"; msg.className="err"; return; }
    if (c.expires && Date.now()/1000>c.expires){ msg.textContent="❌ Expired"; msg.className="err"; return; }
    if ((c.redeemed_by||[]).includes(me.discord_id)){ msg.textContent="❌ Already redeemed"; msg.className="err"; return; }

    await ghUpdate("codes.json",{},cs=>{
      cs[code].redeemed_by=[...(cs[code].redeemed_by||[]),me.discord_id];
      cs[code].used=true; return cs;
    });
    await addTickets(me.discord_id, c.reward||5, `code:${code}`);
    msg.textContent=`✅ +${c.reward||5} tickets!`; msg.className="ok";
    notify(`+${c.reward||5} tickets! 🎫`);
    $("code-input").value="";
  } catch(e){ msg.textContent="❌ Error"; msg.className="err"; }
}

async function renderTrivia(m){

  if(t){m.innerHTML=evHdr(ev)+cdHTML(ev.date,"Trivia Night starts in");startCd(ev.date);return;}

  const data=await ghRead("trivia.json")??{};
  if(data[me.discord_id]?.done){
    m.innerHTML=evHdr(ev)+`<div class="card"><div class="card-title">✅ Submitted</div>
      <p style="color:var(--text2);font-size:.85rem">Score: <span class="gold">${data[me.discord_id].score}/10</span> — results after the event.</p></div>`;
    return;
  }

  let html=evHdr(ev)+`<div class="card"><div class="card-title">Rules</div>
    <p style="color:var(--text2);font-size:.85rem;margin-bottom:.9rem">Answer all 10. Everyone who participates gets <span class="gold">+2 tickets</span>. Top 10 get bonus tickets.</p>

}

function selTrivia(qid,val,btn){
  btn.closest(".qcard").querySelectorAll(".choice").forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel"); triviaAnswers[qid]=val;
}

async function submitTrivia(){
  if(Object.keys(triviaAnswers).length<TQS.length){notify("Answer all questions first","err");return;}
  const score=TQS.reduce((s,q)=>s+(triviaAnswers[q.id]===q.a?1:0),0);
  try {
    await ghUpdate("trivia.json",{},t=>{
      if(t[me.discord_id]?.done) return false;
      t[me.discord_id]={score,done:true,ts:new Date().toISOString()};return t;
    });
    await addTickets(me.discord_id,2,"trivia:participation");
    notify(`Submitted! ${score}/10 — +2 tickets`);
    renderTrivia($("main-content"));
  } catch(e){notify("Save failed","err");}
}

    stamina:s.stamina,max_stamina:s.stamina,xp:0,level:1,gold:200,dmg_base:s.dmg,
    hp_pots:2,mana_pots:2,buffs:[],hidden:false,arcane_nova_used:false,
    soothing_voice_used:false,damage_share_used:false,participation:0};
  try {
    await ghUpdate("boss_raid.json",{hp:BOSS_MAX,max_hp:BOSS_MAX,players:{},log:[],active:true,turn:0},r=>{
      if(r.players[me.discord_id]) return false;
      r.players[me.discord_id]=p;
      r.log=[...(r.log||[]),`${me.username} joined as ${selCls}!`];

async function bossAct(action){
  const raid=await (async()=>{delete _cache["boss_raid.json"];return ghRead("boss_raid.json")})();
  if(!raid||!raid.active){notify("Raid not active","err");return;}
  const p=raid.players[me.discord_id];
  if(!p){notify("Not joined","err");return;}
  const pdmg=()=>Math.floor(p.dmg_base*(1+p.xp/5000)*(p.buffs?.some(b=>b.type==="bless")?1.5:1));
  let logMsg="";
  const cdCheck=(key,ms)=>{if(raid[key]&&Date.now()-raid[key]<ms){notify(`On cooldown — ${Math.ceil((ms-(Date.now()-raid[key]))/60000)}m left`,"err");return false;}return true;};

  switch(action){
    case "attack":{const d=pdmg()*(p.hidden?(p.hidden=false,1.2):1)|0;raid.hp=Math.max(0,raid.hp-d);logMsg=`${p.name} attacked for ${d}!`;p.participation=(p.participation||0)+2;break;}
    case "hide":p.hidden=true;logMsg=`${p.name} hides.`;p.participation=(p.participation||0)+1;break;
    case "shadow_stab":{const d=Math.floor(pdmg()*(p.hidden?1.5:1));p.hidden=false;raid.hp=Math.max(0,raid.hp-d);logMsg=`${p.name} shadow stabbed for ${d}!`;p.participation=(p.participation||0)+2;break;}
    case "shadow_dimension":if(!p.shadow_dim){p.shadow_dim=true;p.hidden=true;logMsg=`${p.name} vanishes into shadow!`;p.participation=(p.participation||0)+1;}break;
    case "bless":Object.values(raid.players).forEach(pl=>{pl.buffs=[...(pl.buffs||[]),{type:"bless",turns:1+Math.floor((p.level||1)/10)}]});logMsg=`${p.name} blesses all!`;p.participation=(p.participation||0)+2;break;
    case "heal":{const h=Math.floor(p.max_hp*.1);p.hp=Math.min(p.max_hp,p.hp+h);logMsg=`${p.name} healed ${h} HP.`;p.participation=(p.participation||0)+2;break;}
    case "soothing_voice":if(!p.soothing_voice_used){Object.values(raid.players).forEach(pl=>{pl.hp=Math.min(pl.max_hp,pl.hp+Math.floor(pl.max_hp*.5));pl.buffs=[...(pl.buffs||[]),{type:"bless",turns:4}]});p.mana=0;p.soothing_voice_used=true;logMsg="Soothing Voice! All healed 50%+blessed!";p.participation=(p.participation||0)+5;}break;
    case "aggro":raid.boss_agro=me.discord_id;logMsg=`${p.name} taunts the boss!`;p.participation=(p.participation||0)+1;break;
    case "shield":Object.values(raid.players).forEach(pl=>{pl.buffs=[...(pl.buffs||[]),{type:"shield",turns:1,val:Math.floor(p.hp*.1)}]});logMsg=`${p.name} shields all!`;p.participation=(p.participation||0)+2;break;
    case "fireball":if(p.mana<80){notify("Need 80 mana","err");return;}else{const d=Math.floor(pdmg()*1.8);p.mana-=80;raid.hp=Math.max(0,raid.hp-d);logMsg=`${p.name} cast Fireball for ${d}!`;p.participation=(p.participation||0)+2;}break;
    case "blizzard":if(p.mana<100){notify("Need 100 mana","err");return;}else{const d=Math.floor(pdmg()*1.4);p.mana-=100;raid.hp=Math.max(0,raid.hp-d);logMsg=`${p.name} cast Blizzard for ${d}!`;p.participation=(p.participation||0)+2;}break;
    case "arcane_nova":if(p.arcane_nova_used){notify("Already used","err");return;}if(p.mana<200){notify("Need 200 mana","err");return;}else{const d=Math.floor(pdmg()*3);p.mana=0;p.arcane_nova_used=true;raid.hp=Math.max(0,raid.hp-d);logMsg=`✨ ARCANE NOVA! ${d}!!`;p.participation=(p.participation||0)+5;}break;
    case "drink_hp_pot":if(!p.hp_pots){notify("No HP pots","err");return;}p.hp=Math.min(p.max_hp,p.hp+Math.floor(p.max_hp*.3));p.hp_pots--;logMsg=`${p.name} drank HP pot.`;break;
    case "drink_mana_pot":if(!p.mana_pots){notify("No mana pots","err");return;}p.mana=Math.min(p.max_mana,p.mana+Math.floor(p.max_mana*.3));p.mana_pots--;logMsg=`${p.name} drank mana pot.`;break;
    case "buy_pot":if(p.gold<50){notify("Need 50 gold","err");return;}p.gold-=50;p.hp_pots++;logMsg=`${p.name} bought HP pot.`;break;
    case "gather":if(!cdCheck(`gc_${me.discord_id}`,600000))return;else{const x=50+Math.floor(Math.random()*100),g=20+Math.floor(Math.random()*40);p.xp+=x;p.gold+=g;p.level=Math.min(20,1+Math.floor(p.xp/500));raid[`gc_${me.discord_id}`]=Date.now();logMsg=`${p.name} gathered (+${x}XP +${g}g).`;}break;
    case "farm":if(!cdCheck(`fc_${me.discord_id}`,1800000))return;else{const x=200+Math.floor(Math.random()*200),g=50+Math.floor(Math.random()*50);p.xp+=x;p.gold+=g;p.level=Math.min(20,1+Math.floor(p.xp/500));raid[`fc_${me.discord_id}`]=Date.now();logMsg=`${p.name} farmed mobs (+${x}XP +${g}g).`;}break;
  }

  // Boss counterattack
  if(["attack","shadow_stab","fireball","blizzard","arcane_nova"].includes(action)&&raid.hp>0){
    const tid=raid.boss_agro??me.discord_id;
    const tp=raid.players[tid]||p;
    const bd=800+Math.floor(Math.random()*700);
    tp.hp=Math.max(0,tp.hp-bd);
    if(tp.hp===0){tp.recovering=true;}
    raid.log=[...(raid.log||[]),`Boss hit ${tp.name||tid} for ${bd}!`];
  }

  // Tick buffs
  Object.values(raid.players).forEach(pl=>{pl.buffs=(pl.buffs||[]).map(b=>({...b,turns:b.turns-1})).filter(b=>b.turns>0)});

  if(logMsg) raid.log=[...(raid.log||[]),logMsg];
  raid.turn=(raid.turn||0)+1;
  raid.players[me.discord_id]=p;
  if(raid.hp<=0){raid.active=false;raid.log=[...(raid.log||[]),"💀 BOSS DEFEATED!"];}

  try {
    await ghWrite("boss_raid.json",raid);
    delete _cache["boss_raid.json"];
    bossPlayer=p;
    if(logMsg) notify(logMsg);
    if(raid.hp<=0){await addTickets(me.discord_id,5,"boss:participation");notify("Boss defeated! +5 🎫");}
    pollBoss();
  } catch(e){notify("Save failed","err");}
}

async function pollBoss(){
  delete _cache["boss_raid.json"];
  const r=await ghRead("boss_raid.json");if(!r)return;
  const f=$("bfill"),h=$("bhp"),b=$("blog");
  if(f)f.style.width=`${Math.max(0,r.hp/r.max_hp*100)}%`;
  if(h)h.textContent=`${r.hp.toLocaleString()} / ${r.max_hp.toLocaleString()} HP`;
  if(b)b.innerHTML=(r.log||[]).slice(-20).reverse().map(l=>`<div>${l}</div>`).join("");
}

const GQS=[
  {id:0,q:"What is Sumnor's favorite color?"},
  {id:1,q:"What is Sumnor's favorite food?"},
  {id:2,q:"What is Sumnor's favorite game genre?"},

];

async function renderGuess(m){
  const ev=EVENTS.find(e=>e.id==="guess");
  const t=timeUntil(ev.date);
  if(t){m.innerHTML=evHdr(ev)+cdHTML(ev.date,"Guessing Game starts in");startCd(ev.date);return;}

  const d=await ghRead("guessing.json")??{};
  if(d[me.discord_id]?.done){
    m.innerHTML=evHdr(ev)+`<div class="card"><div class="card-title">✅ Submitted</div>
      <p style="color:var(--text2);font-size:.85rem">Score: <span class="gold">${d[me.discord_id].score}/10</span></p></div>`;
    return;
  }

  let html=evHdr(ev)+`<div class="card"><div class="card-title">Rules</div>
    <p style="color:var(--text2);font-size:.85rem;margin-bottom:.9rem">Guess Sumnor's answers. If your answer contains the right word, it counts.</p>
    <table class="rtable"><thead><tr><th>Rank</th><th>Tickets</th></tr></thead><tbody>
      <tr><td>🥇 1st</td><td class="gold">+20</td></tr><tr><td>🥈 2nd</td><td class="gold">+10</td></tr>
      <tr><td>🥉 3rd</td><td class="gold">+5</td></tr><tr><td>Participation</td><td class="gold">+1</td></tr>
    </tbody></table></div>`;
  html+=GQS.map(q=>`<div class="qcard"><div class="qt">Q${q.id+1}. ${q.q}</div>
    <input class="ginput" id="g${q.id}" placeholder="Your answer…"></div>`).join("");
  html+=`<button class="btn btn-gold" onclick="submitGuess()" style="margin-top:.9rem">Submit 🎯</button>`;
  m.innerHTML=html;
}

async function submitGuess(){
  const answers={};
  GQS.forEach(q=>{answers[q.id]=($(`g${q.id}`)?.value||"").trim().toLowerCase()});
  const score=GQS.reduce((s,q)=>{
    const c=(GUESSING_ANSWERS[q.id]||"").toLowerCase();
    return s+(answers[q.id].includes(c)?1:0);
  },0);
  try {
    await ghUpdate("guessing.json",{},g=>{
      if(g[me.discord_id]?.done) return false;
      g[me.discord_id]={score,done:true,ts:new Date().toISOString()};return g;
    });
    await addTickets(me.discord_id,1,"guessing:participation");
    const ev=EVENTS.find(e=>e.id==="guess");
    const breakdown=GQS.map(q=>({q:q.q,correct:(answers[q.id]||"").includes((GUESSING_ANSWERS[q.id]||"").toLowerCase()),ans:GUESSING_ANSWERS[q.id]}));
    let html=evHdr(ev)+`<div class="card"><div class="card-title">Results — ${score}/10</div>`;
    breakdown.forEach(b=>{
      html+=`<div style="display:flex;gap:.65rem;align-items:flex-start;padding:.45rem 0;border-bottom:1px solid var(--border)">
        <span>${b.correct?"✅":"❌"}</span>
        <div><div style="font-size:.8rem;color:var(--text2)">${b.q}</div>
        <div style="font-size:.74rem;color:${b.correct?"var(--green)":"var(--red)"}">Answer: ${b.ans}</div></div></div>`;
    });
    html+=`<div style="margin-top:.9rem;color:var(--gold);font-size:.85rem;font-weight:700">+1 ticket awarded</div></div>`;
    $("main-content").innerHTML=html;
  } catch(e){notify("Save failed","err");}
}

const DE=["","⚀","⚁","⚂","⚃","⚄","⚅"];
async function ckTickets(n){
  await refreshTickets();
  if((me?.tickets||0)<n){notify(`Need ${n} tickets, you have ${me.tickets}`,"err");return false;}
  return true;
}

async function playCF(){
  const b=parseInt($("cfb")?.value)||1;
  if(me.tickets>=100){notify("Coin flip disabled above 100 tickets","err");return;}
  if(!await ckTickets(b))return;
  const w=Math.random()<.5;
  await addTickets(me.discord_id,w?b:-b,`casino:cf:${w?"w":"l"}`);
  const c=$("coin");c.classList.add("flip");setTimeout(()=>c.classList.remove("flip"),900);
  $("cfr").innerHTML=w?`<span class="ok">✅ +${b} (${me.tickets})</span>`:`<span class="err">❌ -${b} (${me.tickets})</span>`;
}

async function playSlots(){
  const b=parseInt($("slb")?.value)||1;
  if(!await ckTickets(b))return;
  const s=["🍒","🍋","🍊","⭐","💎","7️⃣"];
  const r=[0,1,2].map(()=>s[Math.floor(Math.random()*s.length)]);
  for(let i=0;i<3;i++){const e=$(`sl${i}`);if(e){e.classList.add("spin");setTimeout(()=>e.classList.remove("spin"),400+i*100);}}
  const d=r[0]===r[1]&&r[1]===r[2]?(r[0]==="💎"?b*5:b*3):(r[0]===r[1]||r[1]===r[2]?Math.floor(b*.5):-b);
  await addTickets(me.discord_id,d,"casino:slots");
  setTimeout(()=>{r.forEach((v,i)=>{const e=$(`sl${i}`);if(e)e.textContent=v;});
    $("slr").innerHTML=d>0?`<span class="ok">+${d} (${me.tickets})</span>`:`<span class="err">${d} (${me.tickets})</span>`;},600);
}

async function playRR(b,solo){
  if(!await ckTickets(b))return;
  const c=1+Math.floor(Math.random()*6),sv=c!==1;
  document.querySelectorAll(".chamber").forEach((el,i)=>{el.className="chamber";el.textContent="🔵";
    if(i===c-1){el.classList.add(sv?"safe":"danger");el.textContent=sv?"✅":"💥";}});
  const d=solo?(sv?b:-b):(sv?25:-5);
  await addTickets(me.discord_id,d,`casino:rr:${sv?"w":"l"}`);
  $("rrr").innerHTML=sv?`<span class="ok">Survived! +${Math.abs(d)} (${me.tickets})</span>`:`<span class="err">💀 BANG! -${Math.abs(d)} (${me.tickets})</span>`;
}

async function playDice(){
  const b=parseInt($("db")?.value)||1;
  if(!await ckTickets(b))return;
  const r=1+Math.floor(Math.random()*6),w=r>=5;
  const d=w?Math.floor(b*1.5):-b;
  $("dice").textContent=DE[r];
  await addTickets(me.discord_id,d,`casino:dice:${w?"w":"l"}`);
  $("dr").innerHTML=w?`<span class="ok">Rolled ${r}! +${Math.abs(d)} (${me.tickets})</span>`:`<span class="err">Rolled ${r}. -${Math.abs(d)} (${me.tickets})</span>`;
}

async function renderLB(m){
  m.innerHTML=`<div class="event-header"><div class="event-title">🏆 Leaderboard</div></div><div class="loading">Loading…</div>`;
  const t=await ghRead("tickets.json")??{};
  const lb=Object.entries(t).sort((a,b)=>b[1].tickets-a[1].tickets).slice(0,20);
  let html=`<div class="event-header"><div class="event-title">🏆 Leaderboard</div></div><div class="card">`;
  if(!lb.length){html+=`<p style="color:var(--text3);font-size:.85rem;padding:.5rem">No entries yet.</p>`;}
  lb.forEach(([did,d],i)=>{
    // Resolve username from keys if possible
    const rc=i===0?"r1":i===1?"r2":i===2?"r3":"";
    const isMe=me?.discord_id===did;
    html+=`<div class="lb-row" style="${isMe?"background:rgba(240,192,64,.04)":""}">
      <div class="lb-rank ${rc}">${i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
      <div class="lb-name">${isMe?`<span class="gold">@${me.username}</span>`:did}${isMe?" <span class='tag tag-gold'>You</span>":""}</div>
      <div class="lb-val">🎫 ${d.tickets}</div>
    </div>`;
  });
  html+=`</div>`;
  m.innerHTML=html;
}
